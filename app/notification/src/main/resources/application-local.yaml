spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:miniserversystem}
    username: ${POSTGRES_USER:miniserversystem}
    password: ${POSTGRES_PASSWORD:miniserversystem}

  flyway:
    enabled: true
    locations: classpath:db/migration

    create-schemas: true
    default-schema: notification
    schemas: notification
    table: flyway_schema_history_notification

    connect-retries: 30
    connect-retries-interval: 2s

notification:
  retention:
    enabled: true
    retention-days: 30
    cleanup-interval-ms: 3600000
  delivery:
    enabled: true
    poll-interval-ms: 1000
    batch-size: 50
    max-attempts: 10
    backoff-base-seconds: 1
    backoff-max-seconds: 60
    backoff-exponent-base: 2.0
    backoff-jitter-min: 0.5
    backoff-jitter-max: 1.5
    backoff-min-seconds: 1
    error-message-max-length: 1000
    lease-seconds: 30
